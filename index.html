<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🎂 生日快乐 🎂</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500&family=Short+Stack&display=swap">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(45deg, #d1eaff, #ffd6e4, #e0f0ff, #ffdae6);
            background-size: 400% 400%;
            animation: bgGradient 18s ease infinite;
            overflow: hidden;
            font-family: "Short Stack", "Ma Shan Zheng", "ZCOOL KuaiLe", "幼圆", cursive, sans-serif;
        }
        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
            z-index: 1;
        }
        @keyframes twinkle {
            0%,100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        .title {
            text-align: center;
            padding-top: 40px;
            font-size: 60px;
            animation: bounce 2s infinite ease-in-out;
            text-shadow: 0 3px 10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
        .title span {
            background: linear-gradient(90deg, #8ac8ff, #ffb6c9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .cake-box {
            text-align: center;
            margin: 20px 0;
            position: relative;
            z-index: 10;
        }
        .cake-img {
            width: 300px;
            height: 300px;
            object-fit: contain;
            animation: rotate 10s infinite linear, float 3s infinite ease-in-out;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        .wish-card {
            width: 620px;
            margin: 0 auto;
            padding: 35px;
            background: rgba(255,255,255,0.92);
            border-radius: 22px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            text-align: center;
            animation: fadeIn 2s ease-out;
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 10;
        }
        .wish-card p {
            font-size: 26px;
            color: #333;
            line-height: 1.8;
            margin: 8px 0;
        }
        .name {
            color: #8ac8ff;
            font-weight: bold;
            font-size: 30px;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }
        .from {
            text-align: center;
            margin-top: 25px;
            color: #5a5a5a;
            font-size: 22px;
            text-shadow: 0 1px 3px rgba(255,255,255,0.8);
            position: relative;
            z-index: 10;
        }
        .petal {
            position: absolute;
            font-size: 22px;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 5;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1 class="title">🎂 <span>生日快乐</span> 🎂</h1>
    <div class="cake-box">
        <img class="cake-img" src="./qcf.gif" alt="蛋糕">
    </div>

    <div class="wish-card">
        <p>尊敬的 <span class="name">偲月大王</span>，</p>
        <p>愿你天天开心 平安喜乐！ ✨</p>
        <p>永远做自己 19岁能恰逢每一个天明！ 💛</p>
        <p>人生真是喵喵又咪咪呀！</p>
    </div>

    <div class="from">          —— YANG 🎈</div>

    <!-- 音乐：自动播放，打开就唱 -->
    <audio autoplay loop id="bgm">
        <source src="./happy.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 自动播放音乐（突破浏览器限制！）
        window.onload = function() {
            let audio = document.getElementById('bgm');
            setTimeout(() => {
                audio.play().catch(() => {
                    document.addEventListener('click', () => audio.play(), { once: true });
                });
            }, 500);
        };

        // 星星
        function createStars() {
            for (let i=0; i<50; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                let size = Math.random()*3+1;
                star.style.width = size+'px';
                star.style.height = size+'px';
                star.style.left = Math.random()*window.innerWidth+'px';
                star.style.top = Math.random()*window.innerHeight+'px';
                star.style.animationDelay = Math.random()*2+'s';
                document.body.appendChild(star);
            }
        }
        createStars();

        // 烟花
        document.addEventListener('click',(e)=>{
            let colors = ['#8ac8ff','#ffb6c9','#d1eaff','#ffd6e4'];
            let fw = document.createElement('div');
            fw.style.cssText = `position:absolute; left:${e.clientX}px; top:${e.clientY}px; transform:translate(-50%,-50%); pointer-events:none; z-index:999`;
            document.body.appendChild(fw);
            for(let i=0;i<36;i++){
                let p = document.createElement('span');
                p.style.cssText = `position:absolute;width:8px;height:8px;border-radius:50%;background:${colors[Math.random()*colors.length|0]};opacity:1`;
                fw.appendChild(p);
                let a = Math.random()*Math.PI*2;
                let s = Math.random()*4+3;
                let t=0;
                function u(){
                    t+=0.05;
                    let x=Math.cos(a)*s*t;
                    let y=Math.sin(a)*s*t+0.5*9.8*t*t;
                    p.style.transform=`translate(${x}px,${y}px)`;
                    p.style.opacity=1-t/1.8;
                    if(t<1.8)requestAnimationFrame(u);
                    else p.remove();
                }
                u();
            }
            setTimeout(()=>fw.remove(),2000);
        });

        // 花瓣
        setInterval(()=>{
            let p = document.createElement('div');
            p.className='petal';
            p.innerText=['🌸','💮','✨','⭐'][Math.random()*4|0];
            p.style.left=Math.random()*window.innerWidth+'px';
            p.style.top='-30px';
            let d=Math.random()*9+5;
            p.style.animationDuration=d+'s';
            document.body.appendChild(p);
            setTimeout(()=>p.remove(),d*1000);
        },280);
    </script>
</body>
</html>
