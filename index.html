<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>🎂 生日快乐 🎂</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500&family=Short+Stack&display=swap">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

      
        body {
            min-height: 100vh;
            background: linear-gradient(45deg, #d1eaff, #ffd6e4, #e0f0ff, #ffdae6);
            background-size: 400% 400%;
            animation: bgGradient 18s ease infinite;
            overflow: hidden;
         
            font-family: "Short Stack", "Ma Shan Zheng", "ZCOOL KuaiLe", "幼圆", cursive, sans-serif;
            position: relative;
        }

   
        @keyframes bgGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

       
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
            z-index: 1;
        }
        @keyframes twinkle {
            0%,100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

    
        .title {
            text-align: center;
            padding-top: 40px;
            font-size: 60px;
            animation: bounce 2s infinite ease-in-out;
            text-shadow: 0 3px 10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        
            font-family: "Short Stack", "Ma Shan Zheng", cursive, sans-serif;
        }
        .title span {
            background: linear-gradient(90deg, #8ac8ff, #ffb6c9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* 蛋糕图片盒子 */
        .cake-box {
            text-align: center;
            margin: 20px 0;
            position: relative;
            z-index: 10;
        }
        /* 蛋糕图片样式 */
        .cake-img {
            width: 250px;
            height: 240px;
            object-fit: contain;
            animation: rotate 10s infinite linear, float 3s infinite ease-in-out;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        /* 祝福卡片 */
        .wish-card {
            width: 620px;
            margin: 0 auto;
            padding: 35px;
            background: rgba(255,255,255,0.92);
            border-radius: 22px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            text-align: center;
            animation: fadeIn 2s ease-out;
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 10;
        }
        .wish-card p {
            font-size: 26px;
            color: #333;
            line-height: 1.8;
            margin: 8px 0;
            /* 卡片手写体 */
            font-family: "Short Stack", "ZCOOL KuaiLe", cursive, sans-serif;
        }
        .name {
            color: #8ac8ff;
            font-weight: bold;
            font-size: 30px;
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 署名 */
        .from {
            text-align: center;
            margin-top: 25px;
            color: #5a5a5a;
            font-size: 22px;
            text-shadow: 0 1px 3px rgba(255,255,255,0.8);
            position: relative;
            z-index: 10;
            /* 署手写体 */
            font-family: "Short Stack", "Ma Shan Zheng", cursive, sans-serif;
        }

        /* 飘落元素 */
        .petal {
            position: absolute;
            font-size: 22px;
            pointer-events: none;
            animation: fall linear infinite;
            z-index: 5;
        }
        @keyframes fall {
            0% {
                transform: translateY(-10vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

    </style>
</head>

<body>
    <h1 class="title">🎂 <span>生日快乐</span> 🎂</h1>

    <!-- 蛋糕图片位置 → 把引号里的 图片链接 换成你自己的即可 -->
    <div class="cake-box">
        <img class="cake-img" src="C:\Users\ASUS\Desktop\qcf.gif" alt="蛋糕">
    </div>

    <div class="wish-card">
        <p>尊敬的 <span class="name">偲月大王</span>，</p>
        <p>愿你天天开心，天天开心！ ✨</p>
        <p>永远做自己 19岁能恰逢每一个天明！ 💛</p>
        <p>人生真是喵喵又咪咪呀！</p>
    </div>

    <div class="from">—— YANG 🎈</div>

    <audio autoplay loop>
        <source src="https://music.163.com/song/media/outer/url?id=1864165149.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 生成星星
        function createStars() {
            const count = 50;
            for (let i=0; i<count; i++) {
                let star = document.createElement('div');
                star.className = 'star';
                let size = Math.random() * 3 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * window.innerWidth + 'px';
                star.style.top = Math.random() * window.innerHeight + 'px';
                star.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(star);
            }
        }
        createStars();

        // 点击烟花（浅蓝+樱花粉）
        function createFirework(x,y) {
            const colors = ['#8ac8ff','#ffb6c9','#d1eaff','#ffd6e4'];
            const fw = document.createElement('div');
            fw.style.cssText = `position:absolute; left:${x}px; top:${y}px; transform:translate(-50%,-50%); pointer-events:none; z-index:999`;
            document.body.appendChild(fw);

            for(let i=0; i<36; i++){
                let p = document.createElement('span');
                p.style.cssText = `position:absolute; width:8px; height:8px; border-radius:50%; background:${colors[Math.random()*colors.length|0]}; opacity:1`;
                fw.appendChild(p);
                let angle = Math.random()*Math.PI*2;
                let speed = Math.random()*4+3;
                let t=0;
                function update(){
                    t+=0.05;
                    let nx = Math.cos(angle)*speed*t;
                    let ny = Math.sin(angle)*speed*t + 0.5*9.8*t*t;
                    p.style.transform = `translate(${nx}px,${ny}px)`;
                    p.style.opacity = 1-t/1.8;
                    if(t<1.8) requestAnimationFrame(update);
                    else p.remove();
                }
                update();
            }
            setTimeout(()=>fw.remove(),2000);
        }
        document.addEventListener('click',e=>createFirework(e.clientX,e.clientY));

        function createPetal(){
            let petal = document.createElement('div');
            petal.className = 'petal';
            petal.innerText = ['🌸','💮','✨','⭐'][Math.random()*4|0];
            
            petal.style.left = Math.random()*window.innerWidth + 'px';
            petal.style.top = '-30px';
            let dur = Math.random()*9 + 5;
            petal.style.animationDuration = dur + 's';
            document.body.appendChild(petal);
            setTimeout(()=>petal.remove(),dur*1000);
        }
        setInterval(createPetal,280);
    </script>
</body>
</html>
